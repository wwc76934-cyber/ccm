<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录｜我的学习站</title>
    <meta name="description" content="登录后使用学习进度、知识库与练习记录。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="topbar">
      <div class="container topbar__inner">
        <div class="brand">
          <div class="brand__logo">LS</div>
          <div class="brand__text">
            <div class="brand__title">我的学习站</div>
            <div class="brand__subtitle">信息技术 × 金融</div>
          </div>
        </div>

        <nav class="nav">
          <a class="nav__link" href="./index.html">首页</a>
          <a class="nav__link" href="./kb.html">知识库</a>
          <a class="nav__link" href="./it.html">信息技术</a>
          <a class="nav__link" href="./finance.html">金融</a>
          <a class="nav__link" href="./sql.html">SQL练习</a>
        </nav>
      </div>
    </header>

    <main class="container main">
      <section class="card auth">
        <div class="auth__left">
          <h1 class="h1">登录后开始沉淀资产</h1>
          <p class="muted">
            这是本地 MVP：密码、进度、知识库笔记都保存在你的浏览器（localStorage），不会上传到服务器。
          </p>
          <div class="auth__bullets">
            <div class="pill">知识库优先：每日置顶 + 资源库</div>
            <div class="pill">SQL 练习：我的答案自动保存</div>
            <div class="pill">可导出/导入：换电脑也能迁移</div>
          </div>
        </div>

        <form id="authForm" class="auth__right">
          <div class="formrow">
            <label class="label" for="password">本地密码</label>
            <input
              id="password"
              class="input"
              type="password"
              minlength="4"
              placeholder="首次会设置密码；之后用同一密码解锁（≥4位）"
              required
            />
          </div>
          <div class="formrow">
            <button class="btn btn--primary" type="submit">进入学习站</button>
          </div>
          <p class="hint">忘记密码：目前无法找回（因为不联网），可清空浏览器站点数据重新开始。</p>
        </form>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner muted">
        <span>本地 MVP｜后续可迁移到 Next.js + 数据库</span>
        <span id="buildInfo"></span>
      </div>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
