<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的学习站｜信息技术 × 金融</title>
    <meta name="description" content="研究生阶段个人学习网站：SQL、AI/大模型、金融就业知识与练习。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="topbar">
      <div class="container topbar__inner">
        <div class="brand">
          <div class="brand__logo">LS</div>
          <div class="brand__text">
            <div class="brand__title">我的学习站</div>
            <div class="brand__subtitle">信息技术 × 金融</div>
          </div>
        </div>

        <nav class="nav">
          <a class="nav__link is-active" href="./index.html" data-route="home">首页</a>
          <a class="nav__link" href="./kb.html" data-route="kb">知识库</a>
          <a class="nav__link" href="./it.html" data-route="it">信息技术</a>
          <a class="nav__link" href="./finance.html" data-route="finance">金融</a>
          <a class="nav__link" href="./sql.html" data-route="sql">SQL练习</a>
        </nav>

        <div class="actions">
          <button id="btnExport" class="btn btn--ghost" type="button" title="导出本地数据">导出</button>
          <label class="btn btn--ghost filebtn" title="导入本地数据">
            导入
            <input id="importFile" type="file" accept="application/json" />
          </label>
          <button id="btnLogout" class="btn btn--ghost" type="button">退出</button>
        </div>
      </div>
    </header>

    <main class="container main">
      <section class="homeHero card homeHero--center">
        <div class="hero__copy hero__copy--center">
          <div class="badge">学习控制台</div>
          <h1 class="h1">专注本周目标，稳定推进学习节奏</h1>
          <p class="muted">首页只保留最核心的内容：目标、进度、执行。其余模块请从导航进入。</p>
        </div>

        <div class="homeWeekly homeWeekly--center">
          <div class="panel__titleRow">
            <div>
              <div class="panel__eyebrow">Weekly Focus</div>
              <div class="panel__title">本周目标</div>
            </div>
            <button id="btnEditWeekly" class="btn btn--ghost btn--sm" type="button">编辑</button>
          </div>

          <div class="panel__grid panel__grid--compact">
            <div class="kpi">
              <div class="kpi__label">已完成</div>
              <div class="kpi__value" id="kpiCompleted">0</div>
            </div>
            <div class="kpi">
              <div class="kpi__label">总课节</div>
              <div class="kpi__value" id="kpiTotal">0</div>
            </div>
            <div class="kpi">
              <div class="kpi__label">完成率</div>
              <div class="kpi__value" id="kpiRate">0%</div>
            </div>
          </div>

          <div class="progressbar" aria-label="progress">
            <div class="progressbar__fill" id="kpiBar" style="width: 0%"></div>
          </div>

          <div class="weekly">
            <div id="weeklyList" class="weekly__list"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner muted">
        <span>本地 MVP｜后续可迁移到 Next.js + 数据库 + 自动判题</span>
        <span id="buildInfo"></span>
      </div>
    </footer>

    <script type="module" src="./app.js"></script>

    <dialog id="weeklyDialog" class="modal">
      <form method="dialog" class="modal__card">
        <div class="modal__head">
          <div>
            <div class="modal__title">编辑本周目标</div>
            <div class="modal__desc">每行一个目标；以 <span class="kbd">[x]</span> 开头表示已完成（可留空）。</div>
          </div>
          <button class="btn btn--ghost btn--sm" value="cancel" type="submit">关闭</button>
        </div>
        <textarea id="weeklyTextarea" class="textarea" rows="10" placeholder="例如：&#10;[ ] SQL 基础 10 题&#10;[ ] 复盘窗口函数 3 题&#10;[ ] 看完一篇财务报表速读"></textarea>
        <div class="modal__actions">
          <button id="btnWeeklyReset" class="btn btn--ghost" type="button">恢复默认</button>
          <button id="btnWeeklySave" class="btn btn--primary" value="ok" type="submit">保存</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
